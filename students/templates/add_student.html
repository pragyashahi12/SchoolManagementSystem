{% extends 'base.html' %}

{% block content %}

<h2>Add Student</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control">
    </div>

    <div class="mb-3">
        <label>Age</label>
        <input type="number" name="age" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control">
    </div>

    <button type="submit" class="btn btn-success">
        Save Student
    </button>

</form>

{% endblock %}
