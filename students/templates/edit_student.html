{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2>Edit Student</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input
                type="text"
                name="name"
                value="{{ student.name }}"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Age</label>
            <input
                type="number"
                name="age"
                value="{{ student.age }}"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                name="email"
                value="{{ student.email }}"
                class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">
            Update Student
        </button>

        <a href="{% url 'home' %}" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

{% endblock %}
