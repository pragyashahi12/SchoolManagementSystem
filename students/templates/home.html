{% extends 'base.html' %}

{% block content %}

<h2>Student List</h2>

<a href="{% url 'add_student' %}"
class="btn btn-success mb-3">

Add Student

</a>

<table class="table table-bordered">

<tr>

<th>Name</th>

<th>Age</th>

<th>Email</th>

<th>Action</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

<td>{{ student.age }}</td>

<td>{{ student.email }}</td>

<td>

<a href="{% url 'edit_student' student.id %}" class="btn btn-warning btn-sm">

Edit

</a>

<a href="{% url 'delete_student' student.id %}" class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}

<form method="GET" class="mb-3">

    <div class="row">

        <div class="col-md-10">

            <input
                type="text"
                name="search"
                class="form-control"
                placeholder="Search Student">

        </div>

        <div class="col-md-2">

            <button class="btn btn-primary w-100">

                Search

            </button>

        </div>

    </div>

</form>
